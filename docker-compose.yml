version: "3.9"

services:
  # ─── PostgreSQL Database ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hospital_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hospb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"          # avoid host port 5432 conflict; use 5433 from host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Express API ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    container_name: hospital_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hospb?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 4000
      CLIENT_URL: http://localhost
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    expose:
      - "4000"               # internal only; nginx proxies externally
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── React Frontend + Nginx ───────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
      args:
        VITE_API_URL: /api        # relative — nginx handles the proxy
        VITE_APP_NAME: MediCare General Hospital
    container_name: hospital_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "4000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
    driver: local
